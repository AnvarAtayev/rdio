name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build & package (universal)
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make app VERSION="$VERSION"
          zip="Rdio-${VERSION}.zip"
          ditto -c -k --keepParent Rdio.app "$zip"
          sha=$(shasum -a 256 "$zip" | awk '{print $1}')
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "### Artifact"
            echo ""
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            echo "| \`$zip\` | \`$sha\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sign update and build appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          ZIP="${{ steps.package.outputs.zip }}"
          # sign_update ships inside the Sparkle SwiftPM artifact fetched by the build.
          SIGN="$(find .build/artifacts -name sign_update -path '*Sparkle*' | head -1)"
          if [ ! -x "$SIGN" ]; then echo "::error::sign_update not found under .build/artifacts"; exit 1; fi
          # Write the key to a file with no trailing newline (`-s` is deprecated;
          # `echo` would append a byte that sign_update rejects). Never printed.
          KEYF="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n' > "$KEYF"
          # Byte count only (44 for a valid key) — reveals no key material.
          echo "key length: $(wc -c < "$KEYF" | tr -d ' ') bytes (expect 44)"
          # Suppress the tool's stderr so a key it was handed can never reach the log.
          if ! SIG="$("$SIGN" --ed-key-file "$KEYF" -p "$ZIP" 2>/dev/null)"; then
            rm -f "$KEYF"
            echo "::error::sign_update failed — verify SPARKLE_PRIVATE_KEY holds the private key from 'generate_keys -x' (expected 44 bytes above)"
            exit 1
          fi
          rm -f "$KEYF"
          echo "signature length: ${#SIG} chars"
          LEN="$(stat -f%z "$ZIP")"
          REPO="$GITHUB_REPOSITORY" TAG="$GITHUB_REF_NAME" \
          VERSION="${{ steps.package.outputs.version }}" \
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ZIP}" \
          SIG="$SIG" LEN="$LEN" \
            bash packaging/make-appcast.sh > appcast.xml

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
          body: |
            ### Download

            **Universal (Apple Silicon + Intel):** `${{ steps.package.outputs.zip }}`
            SHA-256: `${{ steps.package.outputs.sha }}`

      - name: Publish appcast to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git switch main
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged"
          else
            git commit -m "Update appcast for ${GITHUB_REF_NAME}"
            git push origin main
          fi
